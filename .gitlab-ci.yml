include:
  - local: templates/linter-central.yml
    inputs:
      IMAGE: ${BUILD_IMAGE}
  # AI Code Review
  - project: 'redhat/rhel-ai/core/tools/ai-review'
    file: 'ai-review.gitlab-ci.yml'
    inputs:
      INSTRUCTIONS: "Use the repo-reviewer skill for specialized central-linter code review. Focus on Containerfile correctness, linter config changes, MR/commit linter logic, and CI template compatibility."
    rules:
      - if: '$CI_MERGE_REQUEST_LABELS =~ /ai-review/'

variables:
  IMAGE_NAME: "quay.io/aipcc-cicd/central-linter"
  BUILD_IMAGE: "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
  CONTAINERFILE_PATH: "Containerfile"
  CONTEXT_DIR: "."

stages:
  - build
  - lint
  - test
  - push

default:
  tags:
    - aipcc-k8s-cicd

.default_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

build:
  extends: .default_rules
  stage: build
  image: quay.io/buildah/stable:v1.43.1@sha256:ca4edbaabf71ca330ec9b2714bf8e06c726a6e85ae215cfb1474d2e2c832aacb
  tags:
    - aipcc-k8s-build
  before_script:
    - buildah login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY" <<< "$CI_REGISTRY_PASSWORD"
  script:
    - buildah bud --format docker --tag ${BUILD_IMAGE} --file ${CONTAINERFILE_PATH} ${CONTEXT_DIR}
    - buildah push ${BUILD_IMAGE}

linter-central:
  extends: .default_rules
  needs: ["build"]
  before_script:
    - git fetch origin main:main || true

test:
  extends: .default_rules
  stage: test
  image: ${BUILD_IMAGE}
  needs: ["build"]
  script:
    - ruff --version
    - yamllint --version
    - renovate-config-validator
    - shellcheck --version
    - markdownlint --version
    - pytest tests/ -v
    - scripts/vault-login.sh "$(scripts/vault-install.sh)" >/dev/null

push:
  stage: push
  image: quay.io/buildah/stable:v1.43.1@sha256:ca4edbaabf71ca330ec9b2714bf8e06c726a6e85ae215cfb1474d2e2c832aacb
  tags:
    - aipcc-k8s-build
  needs: ["build", "test"]
  before_script:
    - |
      set -e
      VAULT_BIN=$(scripts/vault-install.sh)
      export VAULT_TOKEN=$(scripts/vault-login.sh "${VAULT_BIN}")
      export VAULT_SKIP_VERIFY=1
      QUAY_USERNAME=$("${VAULT_BIN}" kv get -field=username apps/ai-aipcc-cicd/quay/aipcc-cicd/central_linter_gitlab)
      QUAY_PASSWORD=$("${VAULT_BIN}" kv get -field=password apps/ai-aipcc-cicd/quay/aipcc-cicd/central_linter_gitlab)

      buildah login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY" <<< "$CI_REGISTRY_PASSWORD"
      buildah login -u "$QUAY_USERNAME" --password-stdin quay.io <<< "$QUAY_PASSWORD"
  script:
    - buildah pull ${BUILD_IMAGE}
    - |
      push_tag() {
        local tag=$1
        buildah tag ${BUILD_IMAGE} ${IMAGE_NAME}:${tag}
        buildah push ${IMAGE_NAME}:${tag}
      }

      push_tag ${CI_COMMIT_SHORT_SHA}

      if [ -n "$CI_COMMIT_TAG" ]; then
        push_tag ${CI_COMMIT_TAG}
      fi

      if [ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]; then
        push_tag latest
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
