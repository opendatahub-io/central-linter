---
# Shared yamllint configuration
#
# This config is used by:
# 1. Central-linter repository (self-linting via symlink .yamllint -> config/yamllint.yaml)
# 2. Client repositories that don't provide their own .yamllint (bundled in image at ~/.config/yamllint.yaml)
#
# Based on the default relaxed configuration:
# https://yamllint.readthedocs.io/en/stable/configuration.html#default-configuration

extends: default

rules:
  braces:
    level: warning
    max-spaces-inside: 1
  brackets:
    level: warning
    max-spaces-inside: 1
  colons:
    level: warning
  commas:
    level: warning
  comments: disable
  comments-indentation: disable
  document-start: disable
  empty-lines:
    level: warning
  hyphens:
    level: warning
  indentation:
    level: warning
    indent-sequences: consistent
  line-length:
    level: warning
    allow-non-breakable-inline-mappings: true
  truthy: disable
