name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  IMAGE_NAME: quay.io/aipcc-cicd/central-linter
  IMAGE_TAG: ${{ github.sha }}
  CONTAINERFILE_PATH: Containerfile
  CONTEXT_DIR: .
  QUAY_ROBOT_USER: aipcc-cicd+central_linter_github

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build and save image
        run: .github/scripts/build.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: container-image
          path: /tmp/central-linter.tar
          retention-days: 1

  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: container-image
          path: /tmp

      - name: Load image
        run: .github/scripts/load-image.sh

      # linter-mr-commit is excluded: it requires GitLab-specific env vars (CI_MERGE_REQUEST_*)
      - name: Run linters
        run: |
          podman run --rm \
            -v "${{ github.workspace }}:/workspace:Z" \
            central-linter:local \
            make -f /home/linter/Makefile linter-ruff-check linter-yamllint linter-renovate linter-shellcheck linter-markdownlint

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: container-image
          path: /tmp

      - name: Load image
        run: .github/scripts/load-image.sh

      - name: Run tests
        env:
          WORKSPACE: ${{ github.workspace }}
        run: .github/scripts/test.sh

  push:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [build, lint, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: container-image
          path: /tmp

      - name: Load image
        run: .github/scripts/load-image.sh

      # --- OIDC auth (preferred) ---
      - name: Login to Quay via OIDC
        run: .github/scripts/quay-oidc-login.sh

      # --- Static key fallback (uncomment and remove OIDC step above if needed) ---
      # - name: Login to Quay (static key)
      #   run: |
      #     buildah login -u "$QUAY_USERNAME" --password-stdin quay.io <<< "$QUAY_PASSWORD"
      #   env:
      #     QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      #     QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: .github/scripts/push.sh
