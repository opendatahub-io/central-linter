name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: quay.io/aipcc-cicd/central-linter
  IMAGE_TAG: ${{ github.sha }}
  CONTAINERFILE_PATH: Containerfile
  CONTEXT_DIR: .
  QUAY_ROBOT_USER: aipcc-cicd+central_linter_github

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and save image
        run: .github/scripts/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: /tmp/central-linter.tar
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Load image
        run: .github/scripts/load-image.sh

      - name: Run linter-central
        run: |
          podman run --rm \
            -v "${{ github.workspace }}:/workspace:Z" \
            central-linter:local \
            make -f /home/linter/Makefile linter-central

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Load image
        run: .github/scripts/load-image.sh

      - name: Run tests
        env:
          WORKSPACE: ${{ github.workspace }}
        run: .github/scripts/test.sh

  push:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Load image
        run: .github/scripts/load-image.sh

      # --- OIDC auth (preferred) ---
      - name: Login to Quay via OIDC
        run: .github/scripts/quay-oidc-login.sh

      # --- Static key fallback (uncomment and remove OIDC step above if needed) ---
      # - name: Login to Quay (static key)
      #   run: |
      #     buildah login -u "$QUAY_USERNAME" --password-stdin quay.io <<< "$QUAY_PASSWORD"
      #   env:
      #     QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      #     QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

      - name: Push image
        run: .github/scripts/push.sh
