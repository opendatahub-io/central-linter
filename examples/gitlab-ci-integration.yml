# Example: How to integrate central-linter into your GitLab CI/CD pipeline

# ============================================================================
# RECOMMENDED: Use the includable CI template
# ============================================================================
#
# This approach gives you:
# - Version pinning via ref:
# - Automatic updates via Renovate
# - Centralized job definition (no copy-paste)
#
# Add this to your .gitlab-ci.yml:
#
#   include:
#     - project: 'redhat/rhel-ai/ci-cd/central-linter'
#       file: '/templates/linter-central.yml'
#       ref: v0.1.0
#
# To customize the stage (default is 'lint'):
#
#   include:
#     - project: 'redhat/rhel-ai/ci-cd/central-linter'
#       file: '/templates/linter-central.yml'
#       ref: v0.1.0
#       inputs:
#         JOB_STAGE: checks
#
# Add this to your renovate.json for automatic version updates:
#
#   {
#     "customType": "regex",
#     "managerFilePatterns": [".gitlab-ci.yml"],
#     "matchStrings": [
#       "project:\\s*'redhat/rhel-ai/ci-cd/central-linter'\\s+file:\\s*'[^']*'\\s+ref:\\s*(?<currentValue>v[^\\s]+)"
#     ],
#     "datasourceTemplate": "gitlab-releases",
#     "depNameTemplate": "redhat/rhel-ai/ci-cd/central-linter"
#   }

# ============================================================================
# ALTERNATIVE: Direct image reference
# ============================================================================
#
# Use this approach when you need full control over the job definition
# (custom rules, scripts, variables, etc.)

# Shared template for all linter jobs
.lint-template:
  stage: lint
  # IMPORTANT: Pin to a specific version for stability in production
  # Use :latest ONLY for central-linter repo self-linting
  image: quay.io/aipcc-cicd/central-linter:v0.1.0  # Pin to stable version
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^Draft:/
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ============================================================================
# Option 1: Run all linters together using Makefile
# ============================================================================

# Use Case 1a: No config files (uses shared configs from container)
lint-all-shared-config:
  extends: .lint-template
  script:
    - make -f $HOME/Makefile linter-central

# Use Case 1b: Config files in standard locations (auto-discovery)
# Project has: .ruff.toml, .yamllint, renovate.json in project root
lint-all-auto-discovery:
  extends: .lint-template
  script:
    - make -f $HOME/Makefile linter-central

# Use Case 1c: Custom config locations (pass via Makefile variables)
# Project has: .ci/ruff.toml, .ci/yamllint.yaml, config/renovate.json
lint-all-custom-configs:
  extends: .lint-template
  variables:
    RUFF_CONFIG: "--config .ci/ruff.toml"
    YAMLLINT_CONFIG: "-c .ci/yamllint.yaml"
    RENOVATE_CONFIG: "config/renovate.json"
  script:
    - make -f $HOME/Makefile linter-central

# Use Case 1d: Custom config locations (inline pass to make)
lint-all-custom-inline:
  extends: .lint-template
  script:
    - make -f $HOME/Makefile linter-central
        RUFF_CONFIG="--config .ci/ruff.toml"
        YAMLLINT_CONFIG="-c .ci/yamllint.yaml"
        RENOVATE_CONFIG="config/renovate.json"

# Use Case 1e: With additional arguments (e.g., auto-fix)
lint-all-with-args:
  extends: .lint-template
  variables:
    RUFF_ARGS: "check --fix ."
    YAMLLINT_ARGS: "-s ."  # Strict mode
  script:
    - make -f $HOME/Makefile linter-central

# ============================================================================
# Option 2: Run linters individually
# ============================================================================

# Use Case 2a: Individual linters with auto-discovery (no config specified)
ruff-basic:
  extends: .lint-template
  script:
    - ruff check .

yamllint-basic:
  extends: .lint-template
  script:
    - yamllint .

renovate-validate-basic:
  extends: .lint-template
  script:
    - renovate-config-validator

# Use Case 2b: Individual linters with custom config paths
ruff-custom-config:
  extends: .lint-template
  script:
    - ruff check --config .ci/ruff.toml .

yamllint-custom-config:
  extends: .lint-template
  script:
    - yamllint -c .ci/yamllint.yaml .

renovate-validate-custom-config:
  extends: .lint-template
  script:
    - renovate-config-validator --strict config/renovate.json

# Use Case 2c: Individual linters with additional arguments
ruff-with-fix:
  extends: .lint-template
  script:
    - ruff check --fix .

ruff-with-format:
  extends: .lint-template
  script:
    - ruff format --check .

yamllint-strict:
  extends: .lint-template
  script:
    - yamllint -s .

# Use Case 2d: Individual linters with both custom config and args
ruff-custom-config-and-fix:
  extends: .lint-template
  script:
    - ruff check --config .ci/ruff.toml --fix .

yamllint-custom-config-strict:
  extends: .lint-template
  script:
    - yamllint -c .ci/yamllint.yaml -s .
